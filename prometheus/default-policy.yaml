behavior:
  scaleDown:
    stabilizationWindowSeconds: 300
    policies:
    - type: Percent
      value: 80
      periodSeconds: 15
  scaleUp:
    stabilizationWindowSeconds: 0
    policies:
    - type: Percent
      value: 80
      periodSeconds: 15
    - type: Pods
      value: 2
      periodSeconds: 15
    selectPolicy: Max
